name: Deploy API

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v0.8.0)'
        required: true

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: app-dictionaries-manager-prod
  DOTNET_NOLOGO: true

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app-dictionaries-manager-prod.azurewebsites.net

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME -match '^v\d') {
            $env:GITHUB_REF_NAME
          } else {
            '${{ inputs.tag }}'
          }
          $informational = $tag.TrimStart('v')
          # AssemblyVersion accepts Major.Minor.Build[.Revision] only —
          # strip any SemVer prerelease/build suffix.
          $version = $informational -replace '[-+].*$', ''
          "tag=$tag"                     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"             | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "informational=$informational" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore src/API/API.csproj

      - name: Build API
        run: |
          dotnet build src/API/API.csproj \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:InformationalVersion=${{ steps.version.outputs.informational }}

      - name: Install dotnet-ef
        # Pin to EF Core 10.x to match the runtime packages in
        # Directory.Packages.props (10.0.x). Patch floats inside the major.
        run: dotnet tool install --global dotnet-ef --version "10.0.*"

      - name: Generate idempotent migration script
        env:
          # `dotnet ef` boots the API's HostBuilder at design time; the API
          # reads DatabaseProvider + ConnectionStrings:SqlServer from config.
          # The script generator only inspects the model, so a dummy SqlServer
          # connection is enough — it must be SqlServer to emit SqlServer-
          # dialect SQL for the Azure SQL target.
          DatabaseProvider: SqlServer
          ConnectionStrings__SqlServer: "Server=(local);Database=dummy;Integrated Security=true;TrustServerCertificate=true;"
        run: |
          dotnet ef migrations script \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/API/API.csproj \
            --configuration Release \
            --idempotent \
            --no-build \
            --output migrations.sql

      - name: Publish API (framework-dependent)
        run: |
          dotnet publish src/API/API.csproj \
            -c Release \
            --no-restore \
            --no-build \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:InformationalVersion=${{ steps.version.outputs.informational }} \
            -o publish/api

      - name: Upload migration script artifact
        uses: actions/upload-artifact@v4
        with:
          name: migrations-${{ steps.version.outputs.tag }}
          path: migrations.sql
          retention-days: 90

      - name: Apply migrations to Azure SQL
        shell: pwsh
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          if (-not $env:AZURE_SQL_CONNECTION_STRING) {
            Write-Error "AZURE_SQL_CONNECTION_STRING secret is not set."
            exit 1
          }
          Write-Host "::group::Install SqlServer PowerShell module"
          Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser -SkipPublisherCheck
          Write-Host "::endgroup::"
          Write-Host "::group::Apply idempotent migration script"
          Invoke-Sqlcmd `
            -ConnectionString $env:AZURE_SQL_CONNECTION_STRING `
            -InputFile migrations.sql `
            -AbortOnError `
            -ErrorAction Stop `
            -Verbose
          Write-Host "::endgroup::"
          Write-Host "Migrations applied successfully."

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: publish/api

      - name: Post-deploy smoke (/health + /api/version)
        shell: pwsh
        env:
          BASE_URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
          EXPECTED_VERSION: ${{ steps.version.outputs.informational }}
        run: |
          $maxAttempts = 12
          $delaySec    = 10
          $healthUrl   = "$env:BASE_URL/health"
          $versionUrl  = "$env:BASE_URL/api/version"

          # /health — App Service cold-start can take a few attempts after a
          # fresh zip-deploy. 12 * 10s = 2 min upper bound.
          $healthy = $false
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 30
              if ($resp.StatusCode -eq 200) {
                Write-Host "Health OK on attempt ${i}: HTTP $($resp.StatusCode) — $($resp.Content.Trim())"
                $healthy = $true
                break
              }
              Write-Host "Attempt ${i}/${maxAttempts}: HTTP $($resp.StatusCode)"
            } catch {
              Write-Host "Attempt ${i}/${maxAttempts}: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds $delaySec
          }
          if (-not $healthy) {
            Write-Error "Health check did not return 200 after $maxAttempts attempts."
            exit 1
          }

          # /api/version — must match the InformationalVersion baked at build.
          try {
            $payload = Invoke-RestMethod -Uri $versionUrl -TimeoutSec 30
          } catch {
            Write-Error "Failed to read $versionUrl : $($_.Exception.Message)"
            exit 1
          }
          Write-Host "API reports version=$($payload.version) environment=$($payload.environment)"
          # The SDK appends `+<source-revision-id>` to AssemblyInformationalVersion
          # (IncludeSourceRevisionInInformationalVersion is on by default), which
          # is a useful operational breadcrumb but SemVer build metadata, so
          # ignore it for the equality check. Prerelease suffix (e.g. `-rc.1`)
          # IS significant and stays in $reportedSemVer.
          $reportedSemVer = ($payload.version -split '\+')[0]
          if ($reportedSemVer -ne $env:EXPECTED_VERSION) {
            Write-Error "Version mismatch — expected '$env:EXPECTED_VERSION', got '$($payload.version)' (SemVer prefix '$reportedSemVer')."
            exit 1
          }
          Write-Host "Smoke check passed."

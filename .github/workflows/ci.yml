name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — catches dependency drift on idle repos.
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache Lean toolchain
        if: hashFiles('lean-toolchain') != ''
        uses: actions/cache@v5
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-${{ hashFiles('lean-toolchain') }}

      - name: Restore
        run: dotnet restore

      # Whitespace-only because the analyzer phase of `dotnet format` fails with
      # CS0246 on cross-language refs (C# -> F#) on GitHub-hosted runners, even
      # after a successful build. Analyzer/style rules are still enforced via the
      # build's TreatWarningsAsErrors. See docs/Standards/CI.md →
      # "Format check is a hard gate (whitespace-only in CI)".
      - name: Verify formatting (whitespace)
        run: dotnet format whitespace --verify-no-changes --no-restore

      # No --framework filter: it overrides per-project TFMs and breaks legacy
      # net10.0-windows projects. The Linux test leg below enforces the
      # cross-platform contract (Tests are net10.0-only).
      - name: Build (cross-platform leg)
        if: runner.os == 'Linux'
        run: dotnet build --configuration Release --no-restore

      # The root Directory.Build.props sets a singular
      # <TargetFramework>net10.0</TargetFramework>, which leaks into the
      # multi-targeted Tests.csproj and suppresses its net10.0-windows leg on a
      # plain solution build (MSBuild cross-targeting only kicks in when
      # TargetFramework is empty). So build that leg explicitly with --framework;
      # it pulls in GUI.Windows plus every src project and is what makes the
      # #if WINDOWS WPF GUI tests actually build on Windows.
      - name: Build (net10.0-windows leg, includes WPF GUI)
        if: runner.os == 'Windows'
        run: dotnet build tests/Tests/Tests.csproj --framework net10.0-windows --configuration Release --no-restore

      - name: Test (cross-platform leg)
        if: runner.os == 'Linux'
        run: dotnet test --framework net10.0 --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      # net10.0-windows runs the full suite (the cross-platform tests plus the
      # #if WINDOWS GUI tests). net10.0 is already covered by the Linux leg, so
      # it is deliberately not re-run here -- each TFM runs exactly once.
      - name: Test (net10.0-windows leg, includes WPF GUI tests)
        if: runner.os == 'Windows'
        run: dotnet test tests/Tests/Tests.csproj --framework net10.0-windows --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (${{ matrix.os }})
          path: '**/test-results.trx'
          reporter: dotnet-trx

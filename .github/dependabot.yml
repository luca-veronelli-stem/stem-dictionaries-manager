version: 2

updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 10
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
      testing:
        patterns:
          - "xunit*"
          - "FsCheck*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.EntityFrameworkCore*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
